name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.1)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm (latest — v1.x)
        if: startsWith(github.ref_name, 'v1.') || startsWith(inputs.tag, 'v1.')
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (legacy — v0.x)
        if: startsWith(github.ref_name, 'v0.') || startsWith(inputs.tag, 'v0.')
        run: npm publish --access public --tag legacy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
