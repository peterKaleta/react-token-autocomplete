name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm (latest — v1.x)
        if: startsWith(github.ref_name, 'v1.')
        run: npm publish --access public --provenance

      - name: Publish to npm (legacy — v0.x)
        if: startsWith(github.ref_name, 'v0.')
        run: npm publish --access public --tag legacy --provenance
